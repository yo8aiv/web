<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIV Earth Center - HAM Network</title>
    <style>
        :root {
            --bg: #020205;
            --primary: #00f2ff;
            --land: #2d5a27;
            --water: #1a3a6d;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Container for everything */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BIG CENTRAL EARTH */
        .earth-container {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--water);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 30px var(--primary);
            overflow: hidden;
            z-index: 5;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Spinning Land */
        .map-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, var(--land) 15%, transparent 16%),
                radial-gradient(circle at 45% 30%, var(--land) 20%, transparent 21%),
                radial-gradient(circle at 75% 60%, var(--land) 25%, transparent 26%);
            animation: spin 15s linear infinite;
        }

        /* Drifting Clouds */
        .cloud-layer {
            position: absolute;
            width: 200%;
            height: 100%;
            background: transparent;
            opacity: 0.4;
            background-image: 
                radial-gradient(ellipse at 10% 20%, #fff 10%, transparent 20%),
                radial-gradient(ellipse at 60% 80%, #fff 12%, transparent 22%);
            filter: blur(8px);
            animation: spin 25s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* THE BUILDINGS (Static on Earth center) */
        .cityscape {
            position: absolute;
            bottom: 45%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 6;
            pointer-events: none;
        }
        .bldg { fill: #111; stroke: var(--primary); stroke-width: 1; transition: stroke 0.3s; }

        /* AIV LOGO (Floating in front) */
        .logo-overlay {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 0 10px var(--primary));
        }
        .letter {
            fill: none;
            stroke: var(--primary);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke 0.3s;
        }

        /* SATELLITE ORBIT */
        .sat-orbit-path {
            position: absolute;
            width: 700px;
            height: 700px;
            animation: rotate 10s linear infinite;
            z-index: 30;
        }
        .sat-body {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
        }

        /* BEAM */
        #data-beam {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 25;
        }
        #beam-line {
            stroke: var(--primary);
            stroke-width: 2;
            stroke-dasharray: 5;
            opacity: 0.7;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="viewport">
        <div class="earth-container">
            <div class="map-layer"></div>
            <div class="cloud-layer"></div>
            
            <div class="cityscape">
                <svg width="150" height="50" viewBox="0 0 150 50">
                    <rect class="bldg" x="40" y="20" width="15" height="30" />
                    <rect class="bldg" x="60" y="5" width="10" height="45" />
                    <rect class="bldg" x="75" y="15" width="20" height="35" />
                    <circle id="target-point" cx="65" cy="5" r="2" fill="red" />
                </svg>
            </div>
        </div>

        <div class="logo-overlay">
            <svg width="400" height="150" viewBox="0 0 400 150">
                <path class="letter" d="M 80,120 L 130,30 L 180,120 M 105,90 L 155,90" />
                <path class="letter" d="M 200,30 L 200,120" />
                <path class="letter" d="M 220,30 L 270,120 L 320,30" />
            </svg>
        </div>

        <div class="sat-orbit-path">
            <svg class="sat-body" width="60" height="60" viewBox="0 0 100 100">
                <rect x="0" y="40" width="30" height="20" fill="#333" stroke="var(--primary)" />
                <rect x="70" y="40" width="30" height="20" fill="#333" stroke="var(--primary)" />
                <rect x="30" y="30" width="40" height="40" fill="#111" stroke="white" />
                <circle id="sat-origin" cx="50" cy="50" r="2" fill="red" />
            </svg>
        </div>

        <svg id="data-beam">
            <line id="beam-line" x1="0" y1="0" x2="0" y2="0" />
        </svg>
    </div>

    <script>
        const beam = document.getElementById('beam-line');
        const satOrigin = document.getElementById('sat-origin');
        const targetPoint = document.getElementById('target-point');
        const letters = document.querySelectorAll('.letter');
        const bldgs = document.querySelectorAll('.bldg');

        // Mouse Interactivity: Color Change
        window.addEventListener('mousemove', (e) => {
            const hue = (e.clientX / window.innerWidth) * 360;
            const color = `hsl(${hue}, 100%, 60%)`;
            
            // Update CSS Variable
            document.documentElement.style.setProperty('--primary', color);
            
            // Apply to SVG elements directly for smoothness
            letters.forEach(l => l.style.stroke = color);
            bldgs.forEach(b => b.style.stroke = color);
            beam.style.stroke = color;
        });

        // Beam Logic: Connect Sat to Building
        function animateBeam() {
            const satRect = satOrigin.getBoundingClientRect();
            const targetRect = targetPoint.getBoundingClientRect();

            // Set line coordinates based on element positions
            beam.setAttribute('x1', satRect.left + satRect.width / 2);
            beam.setAttribute('y1', satRect.top + satRect.height / 2);
            beam.setAttribute('x2', targetRect.left + targetRect.width / 2);
            beam.setAttribute('y2', targetRect.top + targetRect.height / 2);

            requestAnimationFrame(animateBeam);
        }

        animateBeam();
    </script>
</body>
</html>
