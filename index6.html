<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIV - Deep Space HAM Network</title>
    <style>
        :root {
            --bg: #010103;
            --primary: #00f2ff;
            --land: #2d5a27;
            --water: #0b2545;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* PARALLAX STARFIELD */
        #star-layer {
            position: absolute;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            z-index: 1;
            pointer-events: none;
        }

        /* VIEWPORT CONTAINER */
        .viewport {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* CENTRAL EARTH */
        .earth-container {
            position: relative;
            width: 450px; height: 450px;
            border-radius: 50%;
            background: var(--water);
            box-shadow: inset -30px -30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(0, 242, 255, 0.3);
            overflow: hidden;
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Spinning Land & Clouds */
        .map-layer, .cloud-layer {
            position: absolute;
            width: 200%; height: 100%;
            animation: spin 20s linear infinite;
        }

        .map-layer {
            background-image: 
                radial-gradient(circle at 10% 40%, var(--land) 12%, transparent 13%),
                radial-gradient(circle at 40% 20%, var(--land) 18%, transparent 19%),
                radial-gradient(circle at 70% 70%, var(--land) 22%, transparent 23%),
                radial-gradient(circle at 85% 30%, var(--land) 15%, transparent 16%);
        }

        .cloud-layer {
            opacity: 0.3;
            filter: blur(10px);
            background-image: radial-gradient(ellipse at 30% 50%, #fff 15%, transparent 30%),
                              radial-gradient(ellipse at 80% 20%, #fff 10%, transparent 25%);
            animation-duration: 35s;
            animation-direction: reverse;
        }

        @keyframes spin {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* BUILDINGS */
        .city {
            position: absolute;
            bottom: 40%; width: 100%;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 6;
        }
        .tower { fill: #000; stroke: var(--primary); stroke-width: 1.5; transition: stroke 0.3s; }

        /* AIV LOGO */
        .logo-wrap {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 0 15px var(--primary));
        }
        .letter {
            fill: none;
            stroke: var(--primary);
            stroke-width: 7;
            stroke-linecap: round;
            transition: stroke 0.3s;
        }

        /* SATELLITE ORBIT */
        .orbit-ring {
            position: absolute;
            width: 750px; height: 750px;
            animation: rotate 12s linear infinite;
            z-index: 30;
        }
        .sat { position: absolute; top: 0; left: 50%; transform: translateX(-50%); }

        /* BEAM */
        #beam-svg {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 25;
        }
        #beam-path {
            stroke: var(--primary);
            stroke-width: 2;
            stroke-dasharray: 6;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <svg id="star-layer" xmlns="http://www.w3.org/2000/svg"></svg>

    <div class="viewport">
        <div class="earth-container">
            <div class="map-layer"></div>
            <div class="cloud-layer"></div>
            <div class="city">
                <svg width="100" height="60" viewBox="0 0 100 60">
                    <rect class="tower" x="42" y="10" width="15" height="50" />
                    <line class="tower" x1="50" y1="10" x2="50" y2="0" />
                    <circle id="ground-station" cx="50" cy="0" r="2" fill="red" />
                </svg>
            </div>
        </div>

        <div class="logo-wrap">
            <svg width="450" height="150" viewBox="0 0 450 150">
                <path class="letter" d="M 100,120 L 150,30 L 200,120 M 125,90 L 175,90" />
                <path class="letter" d="M 225,30 L 225,120" />
                <path class="letter" d="M 250,30 L 300,120 L 350,30" />
            </svg>
        </div>

        <div class="orbit-ring">
            <svg class="sat" width="70" height="70" viewBox="0 0 100 100">
                <rect x="0" y="40" width="30" height="20" fill="#222" stroke="var(--primary)" />
                <rect x="70" y="40" width="30" height="20" fill="#222" stroke="var(--primary)" />
                <rect x="30" y="30" width="40" height="40" fill="#111" stroke="#fff" />
                <circle id="sat-antenna" cx="50" cy="50" r="3" fill="red" />
            </svg>
        </div>

        <svg id="beam-svg">
            <line id="beam-path" x1="0" y1="0" x2="0" y2="0" />
        </svg>
    </div>

    <script>
        const stars = document.getElementById('star-layer');
        const starCount = 150;
        const beam = document.getElementById('beam-path');
        const satAntenna = document.getElementById('sat-antenna');
        const groundStation = document.getElementById('ground-station');

        // Create random stars
        for (let i = 0; i < starCount; i++) {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", Math.random() * 100 + "%");
            circle.setAttribute("cy", Math.random() * 100 + "%");
            circle.setAttribute("r", Math.random() * 1.5);
            circle.setAttribute("fill", "white");
            circle.setAttribute("opacity", Math.random());
            stars.appendChild(circle);
        }

        window.addEventListener('mousemove', (e) => {
            const xPercent = e.clientX / window.innerWidth;
            const yPercent = e.clientY / window.innerHeight;

            // Parallax Stars
            const moveX = (xPercent - 0.5) * 30;
            const moveY = (yPercent - 0.5) * 30;
            stars.style.transform = `translate(${moveX}px, ${moveY}px)`;

            // Color shift
            const hue = xPercent * 360;
            const color = `hsl(${hue}, 100%, 65%)`;
            document.documentElement.style.setProperty('--primary', color);
            document.querySelectorAll('.letter, .tower, #beam-path').forEach(el => el.style.stroke = color);
        });

        function syncBeam() {
            const satRect = satAntenna.getBoundingClientRect();
            const groundRect = groundStation.getBoundingClientRect();

            beam.setAttribute('x1', satRect.left + satRect.width/2);
            beam.setAttribute('y1', satRect.top + satRect.height/2);
            beam.setAttribute('x2', groundRect.left + groundRect.width/2);
            beam.setAttribute('y2', groundRect.top + groundRect.height/2);

            requestAnimationFrame(syncBeam);
        }

        syncBeam();
    </script>
</body>
</html>
