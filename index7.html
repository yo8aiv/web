<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIV | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Video Background Styling */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.4); /* Darkens video to make text readable */
        }

        /* Glassmorphism Container */
        .overlay {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        p {
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        /* Project Menu */
        nav ul {
            list-style: none;
        }

        nav ul li {
            margin: 1rem 0;
        }

        .project-link {
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            padding: 10px 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            display: block;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .project-link:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Footer Info */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="assets/backgrnd.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="overlay">
        <div class="content-card">
            <h1>AIV</h1>
            <p>Advancing Global Connectivity</p>
            
            <nav>
                <ul>
                    <li><a href="#project1" class="project-link">HAM Satellite Tracker</a></li>
                    <li><a href="#project2" class="project-link">Global Vector Map</a></li>
                    <li><a href="#project3" class="project-link">Signal Pulse JS</a></li>
                    <li><a href="https://github.com/yo8aiv" class="project-link" style="border-color: #00f2ff;">View GitHub Profile</a></li>
                </ul>
            </nav>
        </div>

        <div class="footer">
            © 2026 AIV Systems | Driven by Code
        </div>
    </div>

</body>
</html>
